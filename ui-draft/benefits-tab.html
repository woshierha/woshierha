<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>权益包2选1 - Vue3 + Vant</title>

  <!-- Vant CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/vant@4/lib/index.css" />

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
      background: rgba(0, 0, 0, 0.45);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    /* ── 弹窗内容区 ── */
    .popup-inner {
      padding: 24px 16px 20px;
    }

    /* ── 提示条 ── */
    .tip-bar {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      background: #f0faf6;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 18px;
      font-size: 12px;
      color: #444;
      line-height: 1.7;
    }
    .tip-tag {
      flex-shrink: 0;
      background: #00c27a;
      color: #fff;
      border-radius: 4px;
      padding: 1px 6px;
      font-size: 11px;
      font-weight: 600;
      margin-top: 2px;
    }

    /* ── Vant Tabs 覆盖样式 ── */
    :root {
      --van-tabs-bottom-bar-color: #00c27a;
      --van-tab-active-text-color: #00c27a;
      --van-tab-font-size: 13px;
      --van-tabs-line-height: 44px;
      --van-button-primary-background: linear-gradient(90deg, #00d085, #00a86b);
      --van-button-primary-border-color: transparent;
    }
    .van-tabs__wrap {
      border-radius: 10px;
      overflow: hidden;
      background: #f2f2f2;
      margin-bottom: 14px;
    }
    .van-tab { font-weight: 600; }
    .van-tabs__line {
      height: 3px !important;
      border-radius: 2px !important;
    }
    /* 隐藏 Vant Tabs 默认的内容容器，Panel 由我们自己渲染 */
    .van-tabs__content { display: none !important; }

    /* ── 权益卡片（唯一共用的 Panel div）── */
    .benefit-card {
      border: 2px solid #00c27a;
      border-radius: 12px;
      padding: 16px;
      background: #f8fffe;
      position: relative;
    }

    /* ── 已选角标 ── */
    .selected-badge {
      position: absolute;
      top: -1px;
      right: -1px;
      background: #00c27a;
      color: #fff;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 10px;
      border-radius: 0 10px 0 10px;
    }

    /* ── 区块标签 ── */
    .section-label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 600;
      margin: 12px 0 10px;
    }
    .section-label:first-of-type { margin-top: 0; }
    .section-label.activate { color: #00c27a; }
    .section-label.consume  { color: #ff7a30; }
    .section-label::before {
      content: "";
      display: inline-block;
      width: 3px;
      height: 13px;
      border-radius: 2px;
    }
    .section-label.activate::before { background: #00c27a; }
    .section-label.consume::before  { background: #ff7a30; }

    /* ── 权益列表 ── */
    .benefit-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .benefit-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }
    .benefit-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: #e6f9f2;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }
    .benefit-name {
      font-size: 13px;
      font-weight: 600;
      color: #1a1a1a;
    }
    .benefit-desc {
      font-size: 11px;
      color: #888;
      margin-top: 2px;
      line-height: 1.5;
    }

    /* ── 底部按钮 ── */
    .footer-btn { margin-top: 20px; padding: 0 0 4px; }
    .van-button--primary {
      background: linear-gradient(90deg, #00d085, #00a86b) !important;
      border: none !important;
      box-shadow: 0 4px 14px rgba(0, 180, 100, 0.35);
    }
  </style>
</head>
<body>

<div id="app"></div>

<!-- Vue 3 -->
<script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
<!-- Vant -->
<script src="https://cdn.jsdelivr.net/npm/vant@4/lib/vant.min.js"></script>

<script>
const { createApp, ref, computed } = Vue;

const App = {
  setup() {
    const show = ref(true);
    const activeTab = ref(0);

    // ── 所有权益包数据 ──
    const packages = [
      {
        title: '🚀 高端出行权益包',
        sections: [
          {
            type: 'activate',
            label: '激活后 获取如下权益',
            items: [
              { icon: '✈️', name: '贵宾室服务 6 次',    desc: '全球贵宾出示厅权益' },
              { icon: '🚗', name: '境内接送服务 2 次',   desc: '境内多家市级机场/站/城际接送服务' },
              { icon: '🛒', name: '低价购接送服务 3 次', desc: '50元即可购享指定机场/站/城际接送服务' },
              { icon: '🛃', name: 'CIP快速通道 1 次',   desc: '尊享机场快捷安检服务' },
              { icon: '🏨', name: '高档酒店住宿 1 次',  desc: '免费入住奢华酒店' },
            ],
          },
          {
            type: 'consume',
            label: '消费达标后 获取如下权益',
            items: [
              { icon: '🚗', name: '境内接送服务 4 次', desc: '每月消费满1万，次日额外赠送1次境内接送服务' },
            ],
          },
        ],
      },
      {
        title: '💊 高端健康权益包',
        sections: [
          {
            type: 'activate',
            label: '激活后 获取如下权益',
            items: [
              { icon: '👨‍⚕️', name: '三甲专家咨询 2 次', desc: '知名三甲医院专家线上健康咨询' },
              { icon: '📅',   name: '专家号预约 1 次',   desc: '享受极速AI挂号或线下专家咨询服务' },
              { icon: '🏥',   name: '综合体检 1 次',     desc: '高端全套综合体检服务' },
              { icon: '🦷',   name: '口腔护理 1 次',     desc: '口腔检查、洁牙和皓白提亮' },
            ],
          },
          {
            type: 'consume',
            label: '消费达标后 获取如下权益',
            items: [
              { icon: '📅', name: '专家号预约 3 次', desc: '每月消费满1万，次日额外赠送1次专家号预约权益' },
            ],
          },
        ],
      },
    ];

    // ── 当前激活的权益包，Panel 唯一共用此计算属性 ──
    const currentPackage = computed(() => packages[activeTab.value]);

    function onConfirm() {
      vant.showToast({
        message: `已选择「${currentPackage.value.title.replace(/^\S+\s/, '')}」`,
        position: 'bottom',
      });
    }

    return { show, activeTab, packages, currentPackage, onConfirm };
  },

  template: `
    <van-popup
      v-model:show="show"
      round
      closeable
      :style="{ width: '90%', maxWidth: '400px' }"
    >
      <div class="popup-inner">

        <!-- 标题 -->
        <van-divider
          :style="{ color: '#1a1a1a', borderColor: 'transparent', fontSize: '18px', fontWeight: 700, margin: '0 0 14px' }"
        >权益包2选1</van-divider>

        <!-- 提示条 -->
        <div class="tip-bar">
          <span class="tip-tag">提示</span>
          <span>持卡客户可在以下权益包中二选一，权益包到期后，自动发放上一年所选择的权益包。选定权益包且已使用包内权益则无法再更换权益包；未使用权益，每激活年支持更换N次权益包。</span>
        </div>

        <!-- Tabs：仅渲染标题栏，Panel 不在 van-tab 内 -->
        <van-tabs v-model:active="activeTab">
          <van-tab
            v-for="(pkg, i) in packages"
            :key="i"
            :title="pkg.title"
          />
        </van-tabs>

        <!-- ★ 唯一共用的 Panel div，响应 currentPackage 变化 ★ -->
        <div class="benefit-card">
          <span class="selected-badge">✓ 当前选择</span>

          <template v-for="(section, sIdx) in currentPackage.sections" :key="sIdx">
            <p :class="['section-label', section.type]">{{ section.label }}</p>
            <ul class="benefit-list">
              <li
                v-for="item in section.items"
                :key="item.name"
                class="benefit-item"
              >
                <div class="benefit-icon">{{ item.icon }}</div>
                <div>
                  <div class="benefit-name">{{ item.name }}</div>
                  <div class="benefit-desc">{{ item.desc }}</div>
                </div>
              </li>
            </ul>
          </template>
        </div>

        <!-- 领取按钮 -->
        <div class="footer-btn">
          <van-button type="primary" round block size="large" @click="onConfirm">
            领取权益
          </van-button>
        </div>

      </div>
    </van-popup>
  `,
};

const app = createApp(App);
app.use(vant);
app.mount('#app');
</script>
</body>
</html>
